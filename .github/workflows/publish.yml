name: Publish to PSGallery

on:
  push:
    tags:
      - 'v*.*.*'   # e.g. v1.2.3
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3) – overrides tag'
        required: true

permissions:
  contents: write   # needed to update manifest and push tag annotation

jobs:
  publish:
    name: Publish Module
    runs-on: windows-latest
    environment: psgallery   # optional: require manual approval in GitHub Environments

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve module manifest
        id: module
        shell: pwsh
        run: |
          $manifestFile = Get-ChildItem -Path . -Recurse -File -Filter '*.psd1' |
            Where-Object { $_.FullName -notmatch '[\\/]\.github[\\/]' } |
            Select-Object -First 1
          if (-not $manifestFile) {
            throw 'No module manifest (.psd1) found in repository.'
          }

          $manifestPath = (Resolve-Path -LiteralPath $manifestFile.FullName).Path
          $moduleDir = Split-Path -Parent $manifestPath
          $manifest = Test-ModuleManifest -Path $manifestPath -ErrorAction Stop

          Write-Host "Found manifest: $manifestPath"
          Write-Host "Module name   : $($manifest.Name)"

          "manifest_path=$manifestPath" >> $env:GITHUB_OUTPUT
          "module_dir=$moduleDir" >> $env:GITHUB_OUTPUT
          "module_name=$($manifest.Name)" >> $env:GITHUB_OUTPUT

      # ── Resolve version ─────────────────────────────────────────────────────
      - name: Resolve version from tag or input
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $ver = '${{ github.event.inputs.version }}'
          } else {
            # Tag is refs/tags/v1.2.3 → strip prefix
            $ver = '${{ github.ref_name }}' -replace '^v', ''
          }
          if ($ver -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version '$ver' is not a valid semver (x.y.z)."
          }
          Write-Host "Publishing version: $ver"
          echo "ver=$ver" >> $env:GITHUB_OUTPUT

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag' -and '${{ github.ref_name }}' -match '^v\d+\.\d+\.\d+$') {
            $tag = '${{ github.ref_name }}'
          } else {
            $tag = "v${{ steps.version.outputs.ver }}"
          }
          Write-Host "Release tag: $tag"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      # ── Update manifest ──────────────────────────────────────────────────────
      - name: Update ModuleVersion in manifest
        shell: pwsh
        run: |
          $ver  = '${{ steps.version.outputs.ver }}'
          $path = '${{ steps.module.outputs.manifest_path }}'
          $content = Get-Content $path -Raw
          $content = $content -replace "ModuleVersion\s*=\s*'[\d\.]+'" , "ModuleVersion     = '$ver'"
          Set-Content $path $content -NoNewline
          Write-Host "ModuleVersion set to $ver"

      # ── Validate ─────────────────────────────────────────────────────────────
      - name: Validate module manifest
        shell: pwsh
        run: |
          $m = Test-ModuleManifest -Path '${{ steps.module.outputs.manifest_path }}' -ErrorAction Stop
          Write-Host "Module: $($m.Name)  Version: $($m.Version)"

      - name: Import module (smoke test)
        shell: pwsh
        run: |
          Import-Module '${{ steps.module.outputs.manifest_path }}' -Force -ErrorAction Stop
          $cmds = Get-Command -Module '${{ steps.module.outputs.module_name }}'
          Write-Host "Exported commands: $($cmds.Count)"

      # ── Run tests ────────────────────────────────────────────────────────────
      - name: Run Pester tests
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object Version -ge '5.0')) {
            Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          }
          if (Test-Path .\tests) {
            $config = New-PesterConfiguration
            $config.Run.Path = '.\tests'
            $config.Output.Verbosity = 'Detailed'
            $result = Invoke-Pester -Configuration $config
            if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) test(s) failed."
            }
          } else {
            Write-Host "No tests folder found – skipping Pester."
          }

      # ── Publish ──────────────────────────────────────────────────────────────
      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          $ver = '${{ steps.version.outputs.ver }}'
          $moduleName = '${{ steps.module.outputs.module_name }}'
          $modulePath = '${{ steps.module.outputs.module_dir }}'

          # Guard: check if this version already exists
          $existing = Find-Module -Name $moduleName -RequiredVersion $ver -ErrorAction SilentlyContinue
          if ($existing) {
            throw "Version $ver already exists in PSGallery. Bump the version before publishing."
          }

          Publish-Module `
            -Path         $modulePath `
            -NuGetApiKey  $env:PSGALLERY_API_KEY `
            -Repository   PSGallery `
            -Verbose

          Write-Host "Published $moduleName $ver"
          Write-Host "https://www.powershellgallery.com/packages/$moduleName/$ver"

      # ── GitHub release ─────────────────────────────────────────────────────
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.module.outputs.module_name }} v${{ steps.version.outputs.ver }}
          generate_release_notes: true
          body: |
            Published to PowerShell Gallery:
            https://www.powershellgallery.com/packages/${{ steps.module.outputs.module_name }}/${{ steps.version.outputs.ver }}
